name: Helm chart CI

on:
  push:
    branches: [main]
    paths:
      - 'Chart.yaml'
      - 'values.yaml'
      - 'values/**'
      - 'README.md'
      - '.helmignore'
      - 'templates/**'
  pull_request:
    branches: [main]
    paths:
      - 'Chart.yaml'
      - 'values.yaml'
      - 'values/**'
      - 'README.md'
      - '.helmignore'
      - 'templates/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      baseline_version:
        description: 'First release version when no tags exist (e.g. 1.0.0)'
        required: false
      release_tag:
        description: 'Release tag override (e.g. longhorn-v1.0.0)'
        required: false

concurrency: helm-chart-longhorn

jobs:
  ci:
    permissions:
      contents: write
      pull-requests: read
    uses: expectedbehaviors/github-actions/.github/workflows/helm-chart-ci.yml@main
    secrets: inherit
    with:
      chart_path: .
      tag_prefix: longhorn-v
      helm_repositories: |
        longhorn=https://charts.longhorn.io
        onepassworditem=https://expectedbehaviors.github.io/OnePasswordItem-helm
      publish_enabled: true
      chart_name: longhorn
      helm_repo_name: longhorn
      helm_repo_url: https://charts.longhorn.io
      helm_repo_name_2: onepassworditem
      helm_repo_url_2: https://expectedbehaviors.github.io/OnePasswordItem-helm
      release_notes_enabled: true
      initial_version: ${{ github.event.inputs.baseline_version || '' }}
      release_tag: ${{ github.event.inputs.release_tag || '' }}
